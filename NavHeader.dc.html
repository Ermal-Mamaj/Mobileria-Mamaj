<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</helmet>

<div style="position: sticky; top: 0; z-index: 30; height: {{ barHeight }}; background: #F6F2E9; border-bottom: 1px solid #EAE2D0; display: flex; align-items: center; justify-content: space-between; padding: {{ barPadding }}; font-family: 'Inter', sans-serif; max-width: 1280px; margin: 0 auto; width: 100%; box-sizing: border-box;">
  <a href="Home.dc.html" style="display: flex; align-items: center; gap: 9px; text-decoration: none;">
    <svg width="{{ logoSize }}" height="{{ logoSize }}" viewBox="0 0 40 36" fill="none" stroke="#22303F" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <rect x="12.5" y="3.5" width="15" height="15" rx="2.5"></rect>
      <path d="M16.5 14.5 v-6 l3.5 3.5 3.5-3.5 v6"></path>
      <path d="M12.5 9 h-4 a3 3 0 0 0-3 3 v8"></path>
      <path d="M27.5 9 h4 a3 3 0 0 1 3 3 v8"></path>
      <rect x="5.5" y="18.5" width="29" height="6" rx="2"></rect>
      <path d="M8.5 24.5 v6 M31.5 24.5 v6 M13.5 24.5 v3.5 M26.5 24.5 v3.5"></path>
    </svg>
    <span style="font-family: 'Poppins', sans-serif; font-size: {{ wordmarkSize }}; font-weight: 700; letter-spacing: 3px; color: #22303F;">MAMAJ</span>
  </a>

  <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ false }}">
    <div style="display: flex; align-items: center; gap: 36px;">
      <sc-for list="{{ items }}" as="item" hint-placeholder-count="4">
        <a href="{{ item.href }}" style="text-decoration: none; font-size: 13.5px; font-weight: {{ item.weight }}; color: {{ item.color }}; letter-spacing: 0.3px; padding-bottom: 4px; border-bottom: 2px solid {{ item.underline }};">{{ item.label }}</a>
      </sc-for>
    </div>
  </sc-if>

  <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ true }}">
    <button aria-label="Menyja" onclick="{{ toggleMenu }}" style="background: none; border: none; padding: 8px; margin: -8px; cursor: pointer; display: flex; flex-direction: column; gap: 4px;">
      <span style="display: block; width: 20px; height: 1.5px; background: #22303F; transition: transform 0.2s, opacity 0.2s; transform: {{ barTopTransform }}; opacity: {{ barMidOpacity }};"></span>
      <span style="display: block; width: 20px; height: 1.5px; background: #22303F; transition: opacity 0.2s; opacity: {{ barMidOpacity }};"></span>
      <span style="display: block; width: 20px; height: 1.5px; background: #22303F; transition: transform 0.2s;"></span>
    </button>
  </sc-if>
</div>

<sc-if value="{{ showMobileMenu }}" hint-placeholder-val="{{ false }}">
  <div onclick="{{ closeMenu }}" style="position: fixed; inset: 66px 0 0 0; background: rgba(22,34,47,0.35); z-index: 28;"></div>
  <div style="position: fixed; top: 66px; left: 0; right: 0; z-index: 29; background: #F6F2E9; border-bottom: 1px solid #EAE2D0; padding: 8px 20px 18px; display: flex; flex-direction: column; box-shadow: 0 12px 24px rgba(22,34,47,0.1);">
    <sc-for list="{{ items }}" as="item" hint-placeholder-count="4">
      <a href="{{ item.href }}" onclick="{{ closeMenu }}" style="display: flex; align-items: center; gap: 10px; padding: 13px 4px; text-decoration: none; border-bottom: 1px solid #EAE2D0; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: {{ item.weight }}; color: {{ item.color }}; letter-spacing: 0.2px;">
        <span style="width: 5px; height: 5px; border-radius: 50%; background: #C9A227; opacity: {{ item.dotOpacity }};"></span>
        {{ item.label }}
      </a>
    </sc-for>
  </div>
</sc-if>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 390, &quot;height&quot;: 66}, &quot;active&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;home&quot;, &quot;options&quot;: [&quot;home&quot;, &quot;categories&quot;, &quot;new&quot;, &quot;contact&quot;], &quot;tsType&quot;: &quot;string&quot;}}">
class Component extends DCLogic {
  state = { isOpen: false, isDesktop: typeof window !== 'undefined' ? window.innerWidth >= 880 : false };

  componentDidMount() {
    this.onResize = () => this.setState({ isDesktop: window.innerWidth >= 880 });
    window.addEventListener('resize', this.onResize);
  }
  componentWillUnmount() {
    window.removeEventListener('resize', this.onResize);
  }

  toggleMenu = () => this.setState(s => ({ isOpen: !s.isOpen }));
  closeMenu = () => this.setState({ isOpen: false });

  renderVals() {
    const active = this.props.active ?? 'home';
    const isDesktop = this.state.isDesktop;
    const defs = [
      { key: 'home', label: 'Ballina', href: 'Home.dc.html' },
      { key: 'categories', label: 'Ambientet', href: 'Categories.dc.html' },
      { key: 'new', label: 'Të Rejat', href: 'Home.dc.html#new' },
      { key: 'contact', label: 'Na Kontaktoni', href: 'Home.dc.html#contactForm' },
    ];
    const items = defs.map(d => ({
      label: d.label,
      href: d.href,
      weight: d.key === active ? 700 : 500,
      color: d.key === active ? '#16222F' : '#5B5546',
      underline: d.key === active ? '#C9A227' : 'transparent',
      dotOpacity: d.key === active ? 1 : 0,
    }));

    return {
      isOpen: this.state.isOpen,
      isDesktop,
      isMobile: !isDesktop,
      showMobileMenu: this.state.isOpen && !isDesktop,
      toggleMenu: this.toggleMenu,
      closeMenu: this.closeMenu,
      items,
      barHeight: isDesktop ? '84px' : '66px',
      barPadding: isDesktop ? '0 40px' : '0 20px',
      logoSize: isDesktop ? 28 : 24,
      wordmarkSize: isDesktop ? '17px' : '15px',
      barTopTransform: this.state.isOpen ? 'translateY(5.5px) rotate(45deg)' : 'none',
      barMidOpacity: this.state.isOpen ? 0 : 1,
    };
  }
}

</script>
</body>
</html>
