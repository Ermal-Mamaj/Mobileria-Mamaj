<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAMAJ — Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #F7F7F5; color: #2D2D2D; }
    ::-webkit-scrollbar { height: 5px; width: 5px; }
    ::-webkit-scrollbar-thumb { background: #D9CBAE; border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    image-slot { display: block; width: 100%; height: 100%; }
    image-slot::part(empty) { justify-content: flex-start; padding-top: 14px; }
  </style>
</helmet>

<div style="width: 390px; min-height: 100vh; background: #FFFFFF; display: flex; flex-direction: column; position: relative;">
  <dc-import name="NavHeader" active="gallery" hint-size="100%,64px"></dc-import>

  <div style="flex: 1; padding: 28px 20px 40px;">
    <h1 style="font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 600; color: #1F2733; margin-bottom: 6px;">Gallery</h1>
    <p style="font-size: 12.5px; color: #7A7266; margin-bottom: 24px;">Real spaces styled with MAMAJ pieces.</p>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <div style="width:100%; height:200px"><x-import component-from-global-scope="image-slot" from="./image-slot.js" id="gallery-1" placeholder="Photo 1" shape="rounded" radius="12" hint-size="100%,200px"></x-import></div>
      <div style="width:100%; height:260px"><x-import component-from-global-scope="image-slot" from="./image-slot.js" id="gallery-2" placeholder="Photo 2" shape="rounded" radius="12" hint-size="100%,260px"></x-import></div>
      <div style="width:100%; height:260px"><x-import component-from-global-scope="image-slot" from="./image-slot.js" id="gallery-3" placeholder="Photo 3" shape="rounded" radius="12" hint-size="100%,260px"></x-import></div>
      <div style="width:100%; height:200px"><x-import component-from-global-scope="image-slot" from="./image-slot.js" id="gallery-4" placeholder="Photo 4" shape="rounded" radius="12" hint-size="100%,200px"></x-import></div>
      <div style="width:100%; height:220px"><x-import component-from-global-scope="image-slot" from="./image-slot.js" id="gallery-5" placeholder="Photo 5" shape="rounded" radius="12" hint-size="100%,220px"></x-import></div>
      <div style="width:100%; height:180px"><x-import component-from-global-scope="image-slot" from="./image-slot.js" id="gallery-6" placeholder="Photo 6" shape="rounded" radius="12" hint-size="100%,180px"></x-import></div>
    </div>
  </div>
</div>
</x-dc>
</body>
</html>
