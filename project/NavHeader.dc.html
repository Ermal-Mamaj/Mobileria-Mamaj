<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  </style>
</helmet>

<div style="position: relative; width: 100%; font-family: 'Inter', -apple-system, sans-serif;">
  <div style="padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; background: #16222F; position: sticky; top: 0; z-index: 20; border-bottom: 1px solid rgba(235,200,76,0.18);">
    <a href="Home Page.dc.html" style="display: flex; align-items: center; gap: 11px; text-decoration: none;">
      <svg width="34" height="31" viewBox="0 0 40 36" fill="none" stroke="#EBC84C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="12.5" y="3.5" width="15" height="15" rx="2.5"></rect>
        <path d="M16.5 14.5 v-6 l3.5 3.5 3.5-3.5 v6"></path>
        <path d="M12.5 9 h-4 a3 3 0 0 0-3 3 v8"></path>
        <path d="M27.5 9 h4 a3 3 0 0 1 3 3 v8"></path>
        <rect x="5.5" y="18.5" width="29" height="6" rx="2"></rect>
        <path d="M8.5 24.5 v6 M31.5 24.5 v6 M13.5 24.5 v3.5 M26.5 24.5 v3.5"></path>
      </svg>
      <div style="display: flex; flex-direction: column; line-height: 1;">
        <span style="font-size: 7px; font-weight: 600; letter-spacing: 1.8px; color: #EBC84C; margin-bottom: 4px; white-space: nowrap;">FABRIKA E MOBILEVE</span>
        <span style="font-family: 'Poppins', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: 4px; color: #FFFFFF;">MAMAJ</span>
      </div>
    </a>
    <button style="width: 40px; height: 40px; border: 1px solid rgba(235,200,76,0.4); border-radius: 9px; background: transparent; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; padding: 0; transition: all 0.2s;" onclick="{{ toggleMenu }}" onmouseover="this.style.background='rgba(235,200,76,0.12)'" onmouseout="this.style.background='transparent'">
      <div style="width: 17px; height: 1.5px; background: #EBC84C; border-radius: 1px;"></div>
      <div style="width: 17px; height: 1.5px; background: #EBC84C; border-radius: 1px;"></div>
      <div style="width: 17px; height: 1.5px; background: #EBC84C; border-radius: 1px;"></div>
    </button>
  </div>

  <div style="display: {{ menuDisplay }}; position: absolute; top: 66px; right: 20px; width: 210px; background: #1C2A3A; border: 1px solid rgba(235,200,76,0.2); border-radius: 12px; box-shadow: 0 16px 40px rgba(0,0,0,0.4); z-index: 25; overflow: hidden;">
    <nav style="display: flex; flex-direction: column; padding: 8px;">
      <a href="Home Page.dc.html" style="padding: 12px 14px; font-size: 13px; color: {{ homeColor }}; text-decoration: none; font-weight: {{ homeWeight }}; border-radius: 8px; letter-spacing: 0.3px; transition: background 0.15s;" onmouseover="this.style.background='rgba(235,200,76,0.1)'" onmouseout="this.style.background='transparent'">Home</a>
      <a href="Categories.dc.html" style="padding: 12px 14px; font-size: 13px; color: {{ categoriesColor }}; text-decoration: none; font-weight: {{ categoriesWeight }}; border-radius: 8px; letter-spacing: 0.3px; transition: background 0.15s;" onmouseover="this.style.background='rgba(235,200,76,0.1)'" onmouseout="this.style.background='transparent'">Categories</a>
      <a href="Gallery.dc.html" style="padding: 12px 14px; font-size: 13px; color: {{ galleryColor }}; text-decoration: none; font-weight: {{ galleryWeight }}; border-radius: 8px; letter-spacing: 0.3px; transition: background 0.15s;" onmouseover="this.style.background='rgba(235,200,76,0.1)'" onmouseout="this.style.background='transparent'">Gallery</a>
      <a href="About Us.dc.html" style="padding: 12px 14px; font-size: 13px; color: {{ aboutColor }}; text-decoration: none; font-weight: {{ aboutWeight }}; border-radius: 8px; letter-spacing: 0.3px; transition: background 0.15s;" onmouseover="this.style.background='rgba(235,200,76,0.1)'" onmouseout="this.style.background='transparent'">About</a>
      <a href="Contact.dc.html" style="padding: 12px 14px; font-size: 13px; color: {{ contactColor }}; text-decoration: none; font-weight: {{ contactWeight }}; border-radius: 8px; letter-spacing: 0.3px; transition: background 0.15s;" onmouseover="this.style.background='rgba(235,200,76,0.1)'" onmouseout="this.style.background='transparent'">Contact</a>
    </nav>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 390, &quot;height&quot;: 66}, &quot;active&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;home&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;home&quot;, &quot;categories&quot;, &quot;gallery&quot;, &quot;about&quot;, &quot;contact&quot;]}}">
class Component extends DCLogic {
  state = { menuOpen: false };

  renderVals() {
    const active = this.props.active || 'home';
    const colorFor = (key) => active === key ? '#EBC84C' : 'rgba(255,255,255,0.82)';
    const weightFor = (key) => active === key ? 600 : 500;
    return {
      menuDisplay: this.state.menuOpen ? 'block' : 'none',
      toggleMenu: () => {
        this.setState(s => ({ menuOpen: !s.menuOpen }));
      },
      homeColor: colorFor('home'), homeWeight: weightFor('home'),
      categoriesColor: colorFor('categories'), categoriesWeight: weightFor('categories'),
      galleryColor: colorFor('gallery'), galleryWeight: weightFor('gallery'),
      aboutColor: colorFor('about'), aboutWeight: weightFor('about'),
      contactColor: colorFor('contact'), contactWeight: weightFor('contact')
    };
  }
}
</script>
</body>
</html>
