<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAMAJ — Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #F7F7F5; color: #2D2D2D; }
    ::-webkit-scrollbar { height: 5px; width: 5px; }
    ::-webkit-scrollbar-thumb { background: #D9CBAE; border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</helmet>

<div style="width: 390px; min-height: 100vh; background: #FFFFFF; display: flex; flex-direction: column; position: relative;">
  <dc-import name="NavHeader" active="contact" hint-size="100%,64px"></dc-import>

  <div style="flex: 1; padding: 28px 20px 40px;">
    <h1 style="font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 600; color: #1F2733; margin-bottom: 6px;">Contact Us</h1>
    <p style="font-size: 12.5px; color: #7A7266; margin-bottom: 24px;">We'd love to hear from you.</p>

    <!-- Contact Info Cards -->
    <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px;">
      <div style="display: flex; gap: 14px; align-items: center; padding: 16px; background: #F7F7F5; border-radius: 12px;">
        <div style="width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #F0D268, #D4AF37); flex-shrink: 0; display: flex; align-items: center; justify-content: center;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1F2733" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        </div>
        <div>
          <h3 style="font-size: 12.5px; font-weight: 600; color: #1F2733; margin-bottom: 2px;">Phone</h3>
          <p style="font-size: 12.5px; color: #7A7266;">+383 44 123 456</p>
        </div>
      </div>
      <div style="display: flex; gap: 14px; align-items: center; padding: 16px; background: #F7F7F5; border-radius: 12px;">
        <div style="width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #F0D268, #D4AF37); flex-shrink: 0; display: flex; align-items: center; justify-content: center;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1F2733" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        </div>
        <div>
          <h3 style="font-size: 12.5px; font-weight: 600; color: #1F2733; margin-bottom: 2px;">Email</h3>
          <p style="font-size: 12.5px; color: #7A7266;">hello@mamaj.com</p>
        </div>
      </div>
      <div style="display: flex; gap: 14px; align-items: center; padding: 16px; background: #F7F7F5; border-radius: 12px;">
        <div style="width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #F0D268, #D4AF37); flex-shrink: 0; display: flex; align-items: center; justify-content: center;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1F2733" stroke-width="2"><path d="M21 10c0 6-9 12-9 12s-9-6-9-12a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
        </div>
        <div>
          <h3 style="font-size: 12.5px; font-weight: 600; color: #1F2733; margin-bottom: 2px;">Showroom</h3>
          <p style="font-size: 12.5px; color: #7A7266;">Rr. Nëna Terezë, Prishtinë</p>
        </div>
      </div>
    </div>

    <!-- Contact Form -->
    <div style="background: linear-gradient(165deg, #FBF8F0, #F3EDE0); border: 1px solid #ECE2CC; border-radius: 16px; padding: 24px 20px;">
      <h3 style="font-family: 'Poppins', sans-serif; font-size: 17px; font-weight: 600; color: #1F2733; margin-bottom: 6px;">Send a Message</h3>
      <p style="font-size: 12.5px; color: #7A7266; margin-bottom: 18px; line-height: 1.5;">Have questions? We'll reply shortly.</p>

      <div style="display: flex; flex-direction: column; gap: 11px;">
        <input type="text" placeholder="Your Name" style="padding: 12px 14px; border: 1px solid #E5DCC6; border-radius: 8px; font-size: 12.5px; outline: none; background: #FFFFFF; transition: border-color 0.2s, box-shadow 0.2s;" onfocus="this.style.borderColor='#E8C547'; this.style.boxShadow='0 0 0 3px rgba(232,197,71,0.15)'" onblur="this.style.borderColor='#E5DCC6'; this.style.boxShadow='none'" />
        <input type="tel" placeholder="Phone Number" style="padding: 12px 14px; border: 1px solid #E5DCC6; border-radius: 8px; font-size: 12.5px; outline: none; background: #FFFFFF; transition: border-color 0.2s, box-shadow 0.2s;" onfocus="this.style.borderColor='#E8C547'; this.style.boxShadow='0 0 0 3px rgba(232,197,71,0.15)'" onblur="this.style.borderColor='#E5DCC6'; this.style.boxShadow='none'" />
        <textarea placeholder="Your Message" style="padding: 12px 14px; border: 1px solid #E5DCC6; border-radius: 8px; font-size: 12.5px; resize: none; height: 84px; outline: none; font-family: 'Inter', sans-serif; background: #FFFFFF; transition: border-color 0.2s, box-shadow 0.2s;" onfocus="this.style.borderColor='#E8C547'; this.style.boxShadow='0 0 0 3px rgba(232,197,71,0.15)'" onblur="this.style.borderColor='#E5DCC6'; this.style.boxShadow='none'"></textarea>
        <button style="padding: 13px 16px; background: linear-gradient(135deg, #F0D268, #D4AF37); border: none; border-radius: 8px; font-size: 12.5px; font-weight: 600; color: #1F2733; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 12px rgba(212,175,55,0.3); margin-top: 4px;" onmouseover="this.style.transform='translateY(-1px)'; this.style.boxShadow='0 6px 16px rgba(212,175,55,0.4)'" onmouseout="this.style.transform='none'; this.style.boxShadow='0 4px 12px rgba(212,175,55,0.3)'">Send Message</button>
      </div>
    </div>
  </div>
</div>
</x-dc>
</body>
</html>
