<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAMAJ — Categories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #F7F7F5; color: #2D2D2D; }
    ::-webkit-scrollbar { height: 5px; width: 5px; }
    ::-webkit-scrollbar-thumb { background: #D9CBAE; border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    image-slot { display: block; width: 100%; height: 100%; }
    image-slot::part(empty) { justify-content: flex-start; padding-top: 14px; }
  </style>
</helmet>

<div style="width: 390px; min-height: 100vh; background: #FFFFFF; display: flex; flex-direction: column; position: relative;">
  <dc-import name="NavHeader" active="categories" hint-size="100%,64px"></dc-import>

  <div style="flex: 1; padding: 28px 20px 40px;">
    <h1 style="font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 600; color: #1F2733; margin-bottom: 6px;">All Categories</h1>
    <p style="font-size: 12.5px; color: #7A7266; margin-bottom: 24px;">Browse furniture by room.</p>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
      <div style="border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform 0.25s; box-shadow: 0 4px 14px rgba(155,139,123,0.25); display: flex; flex-direction: column;" onclick="window.location.href='Living Room.dc.html'" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform='none'">
        <div style="height: 116px; position: relative;"><x-import component-from-global-scope="image-slot" from="./image-slot.js" id="cat-page-living-room" placeholder="Living Room photo" shape="rect" hint-size="100%,116px"></x-import></div>
        <div style="background: #FAF6EE; padding: 9px 12px;">
          <h3 style="font-family: 'Poppins', sans-serif; font-size: 13.5px; font-weight: 600; color: #1F2733; margin-bottom: 1px;">Living Room</h3>
          <p style="font-size: 10.5px; color: #8A8175;">Sofas & Seating</p>
        </div>
      </div>
      <div style="border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform 0.25s; box-shadow: 0 4px 14px rgba(195,168,140,0.25); display: flex; flex-direction: column;" onclick="window.location.href='Bedroom.dc.html'" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform='none'">
        <div style="height: 116px; position: relative;"><x-import component-from-global-scope="image-slot" from="./image-slot.js" id="cat-page-bedroom" placeholder="Bedroom photo" shape="rect" hint-size="100%,116px"></x-import></div>
        <div style="background: #FAF6EE; padding: 9px 12px;">
          <h3 style="font-family: 'Poppins', sans-serif; font-size: 13.5px; font-weight: 600; color: #1F2733; margin-bottom: 1px;">Bedroom</h3>
          <p style="font-size: 10.5px; color: #8A8175;">Beds & Storage</p>
        </div>
      </div>
      <div style="border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform 0.25s; box-shadow: 0 4px 14px rgba(141,155,150,0.25); display: flex; flex-direction: column;" onclick="window.location.href='Kitchen.dc.html'" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform='none'">
        <div style="height: 116px; position: relative;"><x-import component-from-global-scope="image-slot" from="./image-slot.js" id="cat-page-kitchen" placeholder="Kitchen photo" shape="rect" hint-size="100%,116px"></x-import></div>
        <div style="background: #FAF6EE; padding: 9px 12px;">
          <h3 style="font-family: 'Poppins', sans-serif; font-size: 13.5px; font-weight: 600; color: #1F2733; margin-bottom: 1px;">Kitchen</h3>
          <p style="font-size: 10.5px; color: #8A8175;">Dining & Storage</p>
        </div>
      </div>
      <div style="border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform 0.25s; box-shadow: 0 4px 14px rgba(160,138,138,0.25); display: flex; flex-direction: column;" onclick="window.location.href='Dining Room.dc.html'" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform='none'">
        <div style="height: 116px; position: relative;"><x-import component-from-global-scope="image-slot" from="./image-slot.js" id="cat-page-dining" placeholder="Dining Room photo" shape="rect" hint-size="100%,116px"></x-import></div>
        <div style="background: #FAF6EE; padding: 9px 12px;">
          <h3 style="font-family: 'Poppins', sans-serif; font-size: 13.5px; font-weight: 600; color: #1F2733; margin-bottom: 1px;">Dining Room</h3>
          <p style="font-size: 10.5px; color: #8A8175;">Tables & Chairs</p>
        </div>
      </div>
      <div style="border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform 0.25s; box-shadow: 0 4px 14px rgba(160,150,120,0.25); display: flex; flex-direction: column;" onclick="window.location.href='Home Office.dc.html'" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform='none'">
        <div style="height: 116px; position: relative;"><x-import component-from-global-scope="image-slot" from="./image-slot.js" id="cat-page-office" placeholder="Home Office photo" shape="rect" hint-size="100%,116px"></x-import></div>
        <div style="background: #FAF6EE; padding: 9px 12px;">
          <h3 style="font-family: 'Poppins', sans-serif; font-size: 13.5px; font-weight: 600; color: #1F2733; margin-bottom: 1px;">Home Office</h3>
          <p style="font-size: 10.5px; color: #8A8175;">Desks & Shelving</p>
        </div>
      </div>
      <div style="border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform 0.25s; box-shadow: 0 4px 14px rgba(130,140,150,0.25); display: flex; flex-direction: column;" onclick="window.location.href='Outdoor.dc.html'" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform='none'">
        <div style="height: 116px; position: relative;"><x-import component-from-global-scope="image-slot" from="./image-slot.js" id="cat-page-outdoor" placeholder="Outdoor photo" shape="rect" hint-size="100%,116px"></x-import></div>
        <div style="background: #FAF6EE; padding: 9px 12px;">
          <h3 style="font-family: 'Poppins', sans-serif; font-size: 13.5px; font-weight: 600; color: #1F2733; margin-bottom: 1px;">Outdoor</h3>
          <p style="font-size: 10.5px; color: #8A8175;">Patio & Garden</p>
        </div>
      </div>
    </div>
  </div>
</div>
</x-dc>
</body>
</html>
