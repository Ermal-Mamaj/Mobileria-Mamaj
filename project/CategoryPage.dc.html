<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #F6F2E9; color: #22303F; }
    ::-webkit-scrollbar { height: 5px; width: 5px; }
    ::-webkit-scrollbar-thumb { background: #C9B98A; border-radius: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    image-slot { display: block; width: 100%; height: 100%; }
    image-slot::part(empty) { justify-content: flex-start; padding-top: 12px; }
  </style>
</helmet>

<div style="width: 390px; min-height: 100vh; background: #F6F2E9; display: flex; flex-direction: column; position: relative;">
  <dc-import name="NavHeader" active="categories" hint-size="100%,66px"></dc-import>

  <div style="flex: 1;">
    <!-- Category Hero -->
    <div style="height: 190px; position: relative; overflow: hidden; background: #16222F;">
      <div style="position:absolute; inset:0;"><x-import component-from-global-scope="image-slot" from="./image-slot.js" id="{{ heroImageId }}" placeholder="Photo" shape="rect" hint-size="100%,190px"></x-import></div>
      <div style="position: absolute; inset: 0; background: linear-gradient(to top, rgba(15,22,30,0.9) 0%, rgba(15,22,30,0.3) 55%, rgba(15,22,30,0.1) 100%); pointer-events: none;"></div>
      <div style="position: absolute; left: 22px; right: 22px; bottom: 20px; z-index: 2; pointer-events: none;">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
          <div style="width: 20px; height: 1.5px; background: #EBC84C;"></div>
          <span style="font-size: 9.5px; font-weight: 600; letter-spacing: 2px; color: #EBC84C;">COLLECTION</span>
        </div>
        <h1 style="font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 600; color: #FFFFFF; line-height: 1; margin-bottom: 5px;">{{ categoryTitle }}</h1>
        <p style="font-size: 12px; color: rgba(255,255,255,0.8);">{{ categoryTagline }}</p>
      </div>
    </div>

    <!-- Product Grid -->
    <div style="padding: 22px 20px 32px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
      <sc-for list="{{ products }}" as="p" hint-placeholder-count="6">
        <div style="border-radius: 14px; overflow: hidden; background: #FFFFFF; border: 1px solid #EAE2D0; box-shadow: 0 3px 12px rgba(34,48,63,0.06); cursor: pointer; display: flex; flex-direction: column; transition: transform 0.25s, box-shadow 0.25s;" onclick="{{ p.onClick }}" onmouseover="this.style.transform='translateY(-3px)'; this.style.boxShadow='0 10px 24px rgba(34,48,63,0.12)'" onmouseout="this.style.transform='none'; this.style.boxShadow='0 3px 12px rgba(34,48,63,0.06)'">
          <div style="height: 124px; position: relative;">
            <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="{{ p.imageId }}" placeholder="Photo" shape="rect" hint-size="100%,124px"></x-import>
          </div>
          <div style="padding: 12px 13px;">
            <h3 style="font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: #22303F; line-height: 1.05; margin-bottom: 3px;">{{ p.name }}</h3>
            <p style="font-size: 10.5px; color: #948B78; line-height: 1.4;">{{ p.material }}</p>
          </div>
        </div>
      </sc-for>
    </div>
  </div>

  <!-- Detail Overlay -->
  <sc-if value="{{ hasSelected }}" hint-placeholder-val="{{ false }}">
    <div style="position: fixed; left: 0; top: 0; width: 390px; height: 100vh; background: rgba(20,16,12,0.55); z-index: 40; display: flex; align-items: center; justify-content: center; padding: 24px;" onclick="{{ closeDetail }}">
      <div style="width: 100%; background: #F6F2E9; border-radius: 18px; overflow: hidden; max-height: 80vh; overflow-y: auto; box-shadow: 0 24px 60px rgba(0,0,0,0.4);" onclick="{{ stopPropagation }}">
        <div style="height: 250px; position: relative; background: #16222F;">
          <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="{{ selectedImageId }}" placeholder="Photo" shape="rect" hint-size="100%,250px"></x-import>
          <button style="position: absolute; top: 14px; right: 14px; width: 36px; height: 36px; border-radius: 50%; border: none; background: rgba(15,22,30,0.7); color: #EBC84C; font-size: 20px; cursor: pointer; z-index: 2; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);" onclick="{{ closeDetail }}">×</button>
        </div>
        <div style="padding: 24px 22px 30px;">
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
            <div style="width: 18px; height: 1.5px; background: #C9A227;"></div>
            <span style="font-size: 9.5px; font-weight: 600; letter-spacing: 2px; color: #C9A227;">MAMAJ</span>
          </div>
          <h2 style="font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 600; color: #22303F; line-height: 1.05; margin-bottom: 10px;">{{ selectedName }}</h2>
          <p style="font-size: 13.5px; color: #6E6656; line-height: 1.65;">Handcrafted from {{ selectedMaterial }}. Available made-to-order in a range of finishes — visit our showroom to see it in person.</p>
        </div>
      </div>
    </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 390, &quot;height&quot;: 700}, &quot;categorySlug&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;living-room&quot;, &quot;tsType&quot;: &quot;string&quot;}, &quot;categoryTitle&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Living Room&quot;, &quot;tsType&quot;: &quot;string&quot;}, &quot;categoryTagline&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Sofas &amp; seating&quot;, &quot;tsType&quot;: &quot;string&quot;}, &quot;products&quot;: {&quot;editor&quot;: null, &quot;default&quot;: [], &quot;tsType&quot;: &quot;{name: string, material: string}[]&quot;}}">
class Component extends DCLogic {
  state = { selected: null };

  renderVals() {
    const slug = this.props.categorySlug || 'category';
    const rawProducts = this.props.products || [];
    const products = rawProducts.map((p, i) => ({
      ...p,
      imageId: slug + '-product-' + i,
      onClick: (e) => { e.stopPropagation(); this.setState({ selected: i }); }
    }));
    const selectedIndex = this.state.selected;
    const selectedProduct = selectedIndex != null ? products[selectedIndex] : null;

    return {
      categoryTitle: this.props.categoryTitle || '',
      categoryTagline: this.props.categoryTagline || '',
      heroImageId: slug + '-hero',
      products,
      hasSelected: !!selectedProduct,
      selectedName: selectedProduct ? selectedProduct.name : '',
      selectedMaterial: selectedProduct ? selectedProduct.material : '',
      selectedImageId: selectedProduct ? selectedProduct.imageId : slug + '-none',
      closeDetail: () => this.setState({ selected: null }),
      stopPropagation: (e) => e.stopPropagation()
    };
  }
}
</script>
</body>
</html>
